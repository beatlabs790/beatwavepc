name: Build BeatWave PC v1

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Download yt-dlp (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path bin\win
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin\win\yt-dlp.exe"

      - name: Prune Development Dependencies
        run: npm prune --production

      - name: Build Optimized Small-Size Targets
        run: |
          npm run publish:win -- --win nsis zip --publish never `
          -c.asar=true `
          -c.asarUnpack="**/bin/win/yt-dlp.exe" `
          -c.nsis.compression="lzma" `
          -c.nsis.solid=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Binary Artifacts
        shell: pwsh
        run: |
          $VERSION = node -p "require('./package.json').version"
          $targetDir = "build"
          if (!(Test-Path $targetDir)) { New-Item -ItemType Directory -Path $targetDir -Force }
          
          # 1. Locate and stage the compressed NSIS Installer (.exe)
          $exeFile = Get-ChildItem -Path dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*uninstaller*" } | Select-Object -First 1
          if ($exeFile) {
              Copy-Item -Path $exeFile.FullName -Destination "$targetDir\BeatWave-v$VERSION-Windows-Setup.exe" -Force
              Write-Output "Staged Installer: BeatWave-v$VERSION-Windows-Setup.exe"
          } else {
              Write-Error "Installer executable not found!"
              exit 1
          }
          
          # 2. Locate and stage the Portable Zip bundle (.zip)
          $zipFile = Get-ChildItem -Path dist -Filter "*.zip" | Select-Object -First 1
          if ($zipFile) {
              Copy-Item -Path $zipFile.FullName -Destination "$targetDir\BeatWave-v$VERSION-Windows-Portable.zip" -Force
              Write-Output "Staged Portable Zip: BeatWave-v$VERSION-Windows-Portable.zip"
          } else {
              if (Test-Path "dist\win-unpacked") {
                  Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath "$targetDir\BeatWave-v$VERSION-Windows-Portable.zip" -CompressionLevel Optimal -Force
                  Write-Output "Compressed win-unpacked folder into optimal Portable Zip bundle."
              } else {
                  Write-Error "Portable zip target or unpacked contents could not be found!"
                  exit 1
              }
          }

      - name: Upload Build Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: BeatWave-Windows-Build
          path: build/
          if-no-files-found: error