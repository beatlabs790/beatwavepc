name: Build BeatWave PC v1

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Download yt-dlp (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path bin\win
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin\win\yt-dlp.exe"

      - name: Build & Publish Windows Executable
        run: npm run publish:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare and Upload Binary Artifact
        shell: pwsh
        run: |
          # Grabs the compiled version from your package.json
          $VERSION = node -p "require('./package.json').version"
          
          # Locates the newly compiled .exe file (adjust directory depth if your package bundler outputs elsewhere)
          $exeFile = Get-ChildItem -Recurse -Filter *.exe | Where-Object { $_.FullName -notlike "*bin\win*" -and $_.FullName -notlike "*node_modules*" } | Select-Object -First 1
          
          if ($exeFile) {
              $targetPath = "build\BeatWave-v$VERSION-Windows.exe"
              Ensure-Path (Split-Path $targetPath)
              Copy-Item -Path $exeFile.FullName -Destination $targetPath -Force
              Write-Output "Successfully staged: BeatWave-v$VERSION-Windows.exe"
          } else {
              Write-Error "No target application executable was compiled!"
              exit 1
          }
        
      - name: Publish GitHub Release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          
          # Create or edit release title and asset attachment
          gh release create "v${VERSION}" \
            --title "BeatWave PC v${VERSION}" \
            --draft=false \
            --prerelease=${{ inputs.prerelease }} \
            "build/BeatWave-v${VERSION}-Windows.exe" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}